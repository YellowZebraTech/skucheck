<!DOCTYPE html>
<html lang="en">
<!-- Developer: Siu engineer.siu@gmail.com -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORPEDO</title>
    <link rel="stylesheet" href="./static/css/mystyle.css" />
</head>

<body>
   <!-- Error Message -->
   <div id="error-message" style="color: red; text-align: center; margin: 10px 0;"></div>
   
   <!-- Input for SKU Selection -->
   <label for="sku-select">VERIFICADOR DE SKU - VERSIÓN 1.2 (MARZO, 2026)</label>
   <div class="input-container">
       <input list="sku-list" id="sku-select" name="sku-select" placeholder="DESCRIBA EL PRODUCTO ACÁ"/>
       <button id="clear-button" onclick="clearSkuDetails()">BORRAR</button>
   </div>
   <datalist id="sku-list"></datalist>
   
   <!-- SKU Details Table -->
   <div class="table-container">
       <table id="sku-table">
           <thead>
               <tr>
                   <th>SKU</th>                   
                   <th>Nombre</th> 
                   <th>APILABILIDAD</th> 
                   <th>DV</th>
                   <th>Estiba</th>                  
                   <th>Rotación</th>                   
                   <th>Alérgeno</th>
               </tr>
           </thead>
           <tbody id="sku-table-body"></tbody>
       </table>
   </div>

   <script src="./static/js/main.js"></script>
</body>
</html>
